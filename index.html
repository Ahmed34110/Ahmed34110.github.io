<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kassim El Mokaddem - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-emerald-900 to-gray-900">
    
    <div class="glass-card w-full max-w-md rounded-3xl shadow-2xl overflow-hidden text-center relative">
        <div class="h-32 bg-emerald-600 w-full"></div>
        
        <div class="relative -mt-16 mb-4">
            <img src="photo.jpg" alt="Kassim El Mokaddem" class="w-32 h-32 rounded-full mx-auto border-4 border-white object-cover shadow-lg bg-white">
        </div>
        
        <div class="px-8 pb-8">
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Kassim El Mokaddem</h1>
            <p class="text-sm font-medium text-emerald-600 mb-6">Futur Technicien Supérieur en Systèmes Embarqués</p>
            
            <button onclick="downloadVCard()" class="btn-hover w-full bg-emerald-600 text-white font-bold py-4 px-4 rounded-xl mb-6 shadow-lg flex items-center justify-center gap-2 text-sm uppercase tracking-wide">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                Enregistrer mon contact
            </button>
            
            <div class="space-y-3">
                <a href="tel:+33769403239" class="btn-hover flex items-center p-3 bg-gray-50 rounded-xl border border-gray-100 text-gray-700 hover:text-emerald-600 hover:border-emerald-200 font-semibold text-sm">
                    <span class="text-xl mr-3">📞</span> 07 69 40 32 39
                </a>
                <a href="mailto:kassim.elmokaddem@gmail.com" class="btn-hover flex items-center p-3 bg-gray-50 rounded-xl border border-gray-100 text-gray-700 hover:text-emerald-600 hover:border-emerald-200 font-semibold text-sm">
                    <span class="text-xl mr-3">✉️</span> M'envoyer un email
                </a>
                <a href="linkedin.com/in/kassim-el-mokaddem" target="_blank" class="btn-hover flex items-center p-3 bg-gray-50 rounded-xl border border-gray-100 text-gray-700 hover:text-emerald-600 hover:border-emerald-200 font-semibold text-sm">
                    <span class="text-xl mr-3">💼</span> Mon profil LinkedIn
                </a>
            </div>
        </div>
    </div>

    <script>
        function downloadVCard() {
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:El Mokaddem;Kassim;;;\nFN:Kassim El Mokaddem\nTITLE:Futur Technicien Supérieur en Systèmes Embarqués\nTEL;TYPE=CELL:+33769403239\nEMAIL;TYPE=WORK:kassim.elmokaddema@gmail.com\nURL:https://linkedin.com/in/ton-vrai-profil-ici\nEND:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'Kassim_El_Mokaddem.vcf');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
