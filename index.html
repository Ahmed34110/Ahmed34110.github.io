<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; /* Gris clair CV */
        }
        
        /* Fond style grille d'ingénierie / PCB subtil */
        .bg-grid {
            background-size: 30px 30px;
            background-image: 
                linear-gradient(to right, rgba(16, 185, 129, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(16, 185, 129, 0.04) 1px, transparent 1px);
        }

        .sidebar-color {
            background-color: #064e3b; /* Vert foncé CV */
        }
        .accent-color {
            color: #10b981; /* Émeraude CV */
        }

        /* Effet de lueur et de levée subtil */
        .glow-effect {
            transition: all 0.3s ease;
        }
        .glow-effect:hover {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
        }

        /* Animation machine à écrire pour le sous-titre (Optimisé pour Fira Code) */
        .typewriter {
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            border-right: .15em solid #10b981;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: -0.5px;
            animation: typing 2.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #10b981; } }

        /* Animation d'apparition des icônes */
        .fade-in-item {
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

    <script>
        function downloadVCard() {
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:El Mokaddem;Kassim;;;\nFN:Kassim El Mokaddem\nTITLE:Futur Technicien Supérieur en Systèmes Embarqués\nTEL;TYPE=CELL:+33769403239\nEMAIL;TYPE=WORK:kassim.elmokaddema@gmail.com\nURL:https://www.linkedin.com/in/ton-profil\nEND:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'Kassim_El_Mokaddem.vcf');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
